<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>扫雷</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #F44336 0%, #E91E63 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 550px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #F44336;
            margin-bottom: 20px;
        }
        
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        #gameCanvas {
            border: 3px solid #F44336;
            border-radius: 10px;
            display: block;
        }
        
        .info-panel {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            text-align: center;
        }
        
        .info-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }
        
        .info-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #F44336;
        }
        
        .controls {
            width: 100%;
            margin-top: 10px;
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #4CAF50;
            color: white;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #555;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            #gameCanvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💣 扫雷</h1>
        
        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div class="info-panel">
                <div class="info-item">
                    <div class="info-label">标记的地雷</div>
                    <div class="info-value" id="flags">0 / 40</div>
                </div>
            </div>
            
            <div class="controls">
                <button id="btnRestart" class="btn">🔄 重新开始</button>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="index.html" class="back-link">⬅️ 返回游戏大厅</a>
        </div>
        
        <div style="margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 10px; font-size: 14px; color: #666;">
            <strong>操作说明：</strong><br>
            • 左键/点击：揭开格子<br>
            • 右键：标记/取消标记地雷<br>
            • 触摸：点击揭开，长按标记<br>
            • 数字表示周围地雷数量<br>
            • 找出所有非地雷格子即可获胜！<br>
            • 按空格键可快速重新开始
        </div>
    </div>
    
    <script src="minesweeper.js"></script>
</body>
</html>
