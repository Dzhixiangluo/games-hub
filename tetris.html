<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <title>俄罗斯方块</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #2196F3;
            margin-bottom: 20px;
        }
        
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        
        #gameCanvas {
            border: 3px solid #2196F3;
            border-radius: 10px;
            display: block;
        }
        
        .info-panel {
            width: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            text-align: center;
        }
        
        .info-item {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
        }
        
        .info-label {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }
        
        .info-value {
            font-size: 24px;
            font-weight: bold;
            color: #2196F3;
        }
        
        .controls {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            margin-top: 10px;
        }
        
        .btn {
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            background: #2196F3;
            color: white;
        }
        
        .btn:active {
            transform: scale(0.95);
        }
        
        .btn-pause {
            grid-column: span 2;
            background: #FF9800;
        }
        
        .btn-restart {
            grid-column: span 2;
            background: #4CAF50;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: #666;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
        }
        
        .back-link:hover {
            background: #555;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            #gameCanvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧱 俄罗斯方块</h1>
        
        <div class="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            
            <div class="info-panel">
                <div class="info-item">
                    <div class="info-label">得分</div>
                    <div class="info-value" id="score">0</div>
                </div>
                <div class="info-item">
                    <div class="info-label">等级</div>
                    <div class="info-value" id="level">1</div>
                </div>
                <div class="info-item">
                    <div class="info-label">行数</div>
                    <div class="info-value" id="lines">0</div>
                </div>
            </div>
            
            <div class="controls">
                <button id="btnLeft" class="btn">⬅️</button>
                <button id="btnRotate" class="btn">🔄</button>
                <button id="btnRight" class="btn">➡️</button>
                <button id="btnDrop" class="btn">⬇️</button>
                <button id="btnPause" class="btn btn-pause">⏸️ 暂停</button>
                <button id="btnRestart" class="btn btn-restart">🔄 重新开始</button>
            </div>
        </div>
        
        <div style="text-align: center;">
            <a href="index.html" class="back-link">⬅️ 返回游戏大厅</a>
        </div>
        
        <div style="margin-top: 20px; padding: 15px; background: #f5f5f5; border-radius: 10px; font-size: 14px; color: #666;">
            <strong>操作说明：</strong><br>
            • 方向键左右：移动方块<br>
            • 方向键上/W：旋转方块<br>
            • 空格键：快速下落<br>
            • P键：暂停/继续<br>
            • 触摸：左右滑动移动，上滑旋转，下滑快速下落
        </div>
    </div>
    
    <script src="tetris.js"></script>
</body>
</html>
