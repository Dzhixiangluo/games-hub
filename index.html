<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="description" content="4款经典小游戏合集 - 贪吃蛇、俄罗斯方块、消消乐、扫雷">
    <title>游戏大厅 - 经典小游戏合集</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.8s ease;
        }
        
        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 10px;
            text-shadow: 0 4px 12px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            color: rgba(255,255,255,0.9);
            font-size: 18px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }
        
        .game-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeInUp 0.6s ease;
            position: relative;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .game-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        
        .game-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, var(--card-color), var(--card-color-light));
        }
        
        .game-card.snake { --card-color: #4CAF50; --card-color-light: #81C784; }
        .game-card.tetris { --card-color: #2196F3; --card-color-light: #64B5F6; }
        .game-card.match3 { --card-color: #FF9800; --card-color-light: #FFB74D; }
        .game-card.mine { --card-color: #F44336; --card-color-light: #E57373; }
        .game-card.gobang { --card-color: #8B4513; --card-color-light: #A0522D; }
        
        .game-icon {
            font-size: 72px;
            margin-bottom: 20px;
            animation: bounce 2s infinite;
        }
        
        .game-title {
            font-size: 28px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }
        
        .game-desc {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 12px;
            margin-top: 10px;
            background: var(--card-color);
            color: white;
        }
        
        footer {
            text-align: center;
            color: white;
            margin-top: 60px;
            padding: 20px;
            animation: fadeIn 1s ease;
        }
        
        footer a {
            color: white;
            text-decoration: none;
            opacity: 0.9;
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        @media (max-width: 768px) {
            h1 { font-size: 36px; }
            .games-grid { grid-template-columns: 1fr; }
            .game-card { padding: 25px; }
            .game-icon { font-size: 60px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🎮 游戏大厅</h1>
            <p class="subtitle">5款经典小游戏 · 随时随地畅玩</p>
        </header>
        
        <div class="games-grid">
            <a href="snake.html" class="game-card snake">
                <div class="game-icon">🐍</div>
                <div class="game-title">贪吃蛇</div>
                <div class="game-desc">
                    经典贪吃蛇游戏<br>
                    吃食物、长身体、不碰壁
                </div>
                <div class="status">立即游玩</div>
            </a>
            
            <a href="tetris.html" class="game-card tetris">
                <div class="game-icon">🧱</div>
                <div class="game-title">俄罗斯方块</div>
                <div class="game-desc">
                    经典益智消除游戏<br>
                    旋转方块、消除得分
                </div>
                <div class="status">立即游玩</div>
            </a>
            
            <a href="match3.html" class="game-card match3">
                <div class="game-icon">💎</div>
                <div class="game-title">消消乐</div>
                <div class="game-desc">
                    三消益智游戏<br>
                    交换宝石、连消得分
                </div>
                <div class="status">立即游玩</div>
            </a>
            
            <a href="minesweeper.html" class="game-card mine">
                <div class="game-icon">💣</div>
                <div class="game-title">扫雷</div>
                <div class="game-desc">
                    经典逻辑推理游戏<br>
                    标记地雷、安全通关
                </div>
                <div class="status">立即游玩</div>
            </a>
            
            <a href="gobang.html" class="game-card gobang">
                <div class="game-icon">♟️</div>
                <div class="game-title">五子棋</div>
                <div class="game-desc">
                    人机对战五子棋<br>
                    五子连珠即可获胜
                </div>
                <div class="status">立即游玩</div>
            </a>
        </div>
        
        <footer>
            <p>🎯 支持 PWA · 可安装到主屏幕 · 离线畅玩</p>
            <p style="margin-top: 10px; font-size: 14px; opacity: 0.8;">
                © 2026 游戏大厅 · 
                <a href="https://github.com/dzhixiangluo" target="_blank">GitHub</a>
            </p>
        </footer>
    </div>
    
    <script>
        // 注册 Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js')
                .then(reg => console.log('Service Worker 注册成功:', reg))
                .catch(err => console.log('Service Worker 注册失败:', err));
        }
        
        // 添加触摸反馈
        document.querySelectorAll('.game-card').forEach(card => {
            card.addEventListener('touchstart', function() {
                this.style.transform = 'scale(0.95)';
            });
            card.addEventListener('touchend', function() {
                this.style.transform = '';
            });
        });
    </script>
</body>
</html>
